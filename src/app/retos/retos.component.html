<div class="card h-100 shadow-sm">
  <div class="card-header bg-danger text-white">
    <h2 class="h5 mb-0">⚔️ Reto semanal</h2>
  </div>
  <div class="card-body text-center">
    <p [style.textDecoration]="completado ? 'line-through' : 'none'" class="lead">
      {{ reto }}
    </p>
    <button (click)="completarReto()" [disabled]="completado" class="btn btn-outline-danger">
      {{ completado ? '✅ ¡Reto superado! +100XP' : '🏆 Completar reto' }}
    </button>
  </div>
</div>
